name: Minecraft Daily Backup

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # SSH Key sicher schreiben + CRLF entfernen
          printf "%s" "${{ secrets.SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          # Known Hosts
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

          # verhindert "too many auth failures"
          cat > ~/.ssh/config << 'EOF'
Host *
  IdentitiesOnly yes
EOF

      - name: Test SSH connection
        run: ssh -o BatchMode=yes "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "echo SSH_OK"

      - name: Backup ausführen
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
            set -e

            cd "${{ secrets.SERVER_PATH }}"

            # Minecraft Welt speichern
            screen -S minecraft -p 0 -X stuff "save-all$(printf '\r')" || true

            sleep 5

            # Git Setup
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"

            git add .

            git commit -m "Automatisches Backup $(date '+%Y-%m-%d %H:%M:%S')" || echo "Keine Änderungen"

            git push
          EOF