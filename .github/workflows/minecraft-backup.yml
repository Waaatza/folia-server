name: Minecraft Daily Backup

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # SSH Key korrekt schreiben (wichtig: keine Formatzerstörung)
          printf "%s" "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          # Host Key speichern
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Backup ausführen
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << EOF

            set -e

            cd "${{ secrets.SERVER_PATH }}"

            # Minecraft Welt speichern (falls screen genutzt wird)
            screen -S minecraft -p 0 -X stuff "save-all$(printf '\r')" || true

            sleep 5

            # Git konfigurieren
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"

            # Änderungen committen
            git add .

            git commit -m "Automatisches Backup $(date '+%Y-%m-%d %H:%M:%S')" || echo "Keine Änderungen"

            git push

          EOF