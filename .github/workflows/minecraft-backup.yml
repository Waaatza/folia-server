name: Minecraft Daily Backup

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # KEY sauber schreiben (WICHTIG: kein heredoc!)
          printf "%s" "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

          echo -e "Host *\n  IdentitiesOnly yes\n" > ~/.ssh/config

      - name: Test SSH connection
        run: ssh -v "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "echo OK"

      - name: Backup ausführen
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'

            set -e

            cd "${{ secrets.SERVER_PATH }}"

            screen -S minecraft -p 0 -X stuff "save-all$(printf '\r')" || true

            sleep 5

            git config user.name "github-actions"
            git config user.email "github-actions@github.com"

            git add .

            git commit -m "Automatisches Backup $(date '+%Y-%m-%d %H:%M:%S')" || echo "Keine Änderungen"

            git push

          EOF